<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdWeek Sponsorship Opportunity Finder | May 2026–July 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a2744;
      --navy-mid: #2c3f6b;
      --light-blue: #00acd8;
      --light-blue-bg: #e6f7fc;
      --light-blue-border: #b3e4f4;
      --red: #bf062f;
      --gray-50: #f7f7f5;
      --gray-500: #888780;
      --gray-700: #444441;
      --white: #ffffff;
      --border: rgba(26,39,68,0.12);
      --border-hover: rgba(26,39,68,0.3);
      --radius: 8px;
      --radius-lg: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--gray-50); color: var(--gray-700); min-height: 100vh; }

    .header { background: var(--white); border-bottom: 3px solid var(--light-blue); padding: 18px 0; }
    .header-inner { max-width: 880px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .header-logo { height: 44px; width: auto; display: block; }


    .hero { background: var(--light-blue-bg); border-bottom: 1px solid var(--light-blue-border); padding: 36px 2rem 32px; }
    .hero-inner { max-width: 880px; margin: 0 auto; }
    .hero h1 { font-family: 'Source Serif 4', serif; font-size: 28px; font-weight: 600; color: var(--navy); line-height: 1.2; letter-spacing: -0.3px; margin-bottom: 8px; }
    .hero p { font-size: 15px; color: var(--gray-500); line-height: 1.6; max-width: 560px; }

    .main { max-width: 880px; margin: 0 auto; padding: 2rem; }

    .filter-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
    .filter-row { margin-bottom: 1.25rem; }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .filter-label { font-size: 12px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--gray-500); }
    .clear-btn { font-size: 12px; color: var(--gray-500); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; font-family: inherit; }
    .clear-btn:hover { color: var(--navy); }
    .filter-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
    .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--gray-50); color: var(--gray-500); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.14s ease; }
    .tag-btn:hover { border-color: var(--border-hover); color: var(--navy); background: #eef1f8; }
    .tag-btn.active { background: var(--navy); border-color: var(--navy); color: var(--white); }
    .tag-btn.active.pf-forum      { background: #00acd8; border-color: #00acd8; color: #ffffff; }
    .tag-btn.active.pf-report     { background: #0626a9; border-color: #0626a9; color: #ffffff; }
    .tag-btn.active.pf-webinar    { background: #bf062f; border-color: #bf062f; color: #ffffff; }
    .tag-btn.active.pf-video      { background: #f29500; border-color: #f29500; color: #ffffff; }
    .tag-btn.active.pf-event      { background: #7788d0; border-color: #7788d0; color: #ffffff; }
    .tag-btn.active.pf-discussion { background: #7697ac; border-color: #7697ac; color: #ffffff; }
    .tag-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
    .tag-btn.active .tag-dot { opacity: 1; }
    .tag-btn.active:not([class*="pf-"]) .tag-dot { background: var(--light-blue); }

    .results-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .results-count { font-size: 13px; color: var(--gray-500); font-weight: 500; }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray-500); }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .results-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .result-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; transition: border-color 0.12s; }
    .result-card:hover { border-color: var(--border-hover); }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .card-top.has-desc { margin-bottom: 10px; }
    .result-title { font-size: 14px; font-weight: 500; color: var(--navy); line-height: 1.4; margin-bottom: 3px; }
    .result-date  { font-size: 12px; color: var(--gray-500); }
    .result-desc  { font-size: 12px; color: var(--gray-500); line-height: 1.6; padding-top: 10px; border-top: 1px solid var(--border); }
    .format-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.02em; flex-shrink: 0; }
    .badge-forum      { background: #ffffff; border: 1.5px solid #00acd8; color: #00acd8; }
    .badge-report     { background: #ffffff; border: 1.5px solid #0626a9; color: #0626a9; }
    .badge-webinar    { background: #ffffff; border: 1.5px solid #bf062f; color: #bf062f; }
    .badge-video      { background: #ffffff; border: 1.5px solid #f29500; color: #f29500; }
    .badge-event      { background: #ffffff; border: 1.5px solid #7788d0; color: #7788d0; }
    .badge-discussion { background: #ffffff; border: 1.5px solid #7697ac; color: #7697ac; }

    .cta-bar { background: var(--navy); border-radius: var(--radius-lg); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .cta-text p:first-child { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
    .cta-text p:last-child  { font-size: 13px; color: rgba(255,255,255,0.55); }
    .cta-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius); background: var(--light-blue); color: var(--white); font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; text-decoration: none; white-space: nowrap; transition: background 0.13s; }
    .cta-btn:hover { background: #0090b8; }

    .result-card--expandable:hover { border-color: var(--light-blue); }
    .result-desc--hidden { display: none; }

    .footer { text-align: center; padding: 2.5rem 1rem; font-size: 12px; color: #c5c4be; }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .hero h1 { font-size: 22px; }
      .card-top { flex-direction: column; align-items: flex-start; }
      .cta-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const now   = new Date();
const curYear  = now.getFullYear();
const curMonth = now.getMonth(); // 0-indexed

// Calendar end: July 2027 → year=2027, month=6 (0-indexed)
const endYear  = 2027;
const endMonth = 6;

function headerDateRange() {
  const startLabel = MONTHS[curMonth] + " " + curYear;
  const endLabel   = MONTHS[endMonth] + " " + endYear;
  return "Sponsorship Opportunities \u2022 " + startLabel + "\u2013" + endLabel;
}



// ── Parse a display date string into {year, month} (0-indexed month) ─────────
function parseOppDate(dateStr) {
  // Handles: "May 2026", "May 4, 2026", "May 2026 (tentative)", "May\u2013July 1, 2026", etc.
  const clean = dateStr.replace(/\(.*\)/, "").trim();
  // Pull last 4-digit year
  const yearMatch = clean.match(/(\d{4})/);
  if (!yearMatch) return null;
  const year = parseInt(yearMatch[1]);
  // Pull first month name
  const monthMatch = clean.match(new RegExp(MONTHS.join("|"), "i"));
  if (!monthMatch) return null;
  const month = MONTHS.findIndex(m => m.toLowerCase() === monthMatch[0].toLowerCase());
  return { year, month };
}

function isVisible(opp) {
  const d = parseOppDate(opp.date);
  if (!d) return true; // show if unparseable
  if (d.year > curYear) return true;
  if (d.year === curYear && d.month >= curMonth) return true;
  return false;
}

  { date: "March 8, 2027",            title: "The State of Teaching (annual)",                                                                                      format: "Video",                  tags: ["teaching"] },

];

// Filter out past months on load
const visibleOpps = opps.filter(isVisible);

let selectedTopics  = new Set();
let selectedFormats = new Set();

function formatFamily(format) {
  const f = format.toLowerCase();
  if (f.includes("forum"))      return "K-12 Essentials Forum";
  if (f.includes("report"))     return "Special Report";
  if (f.includes("webinar"))    return "Webinar";
  if (f.includes("video"))      return "Video";
  if (f.includes("event"))      return "Special Event";
  if (f.includes("discussion")) return "Live Online Discussion";
  return format;
}

function badgeClass(format) {
  const f = format.toLowerCase();
  if (f.includes("forum"))      return "badge-forum";
  if (f.includes("report"))     return "badge-report";
  if (f.includes("webinar"))    return "badge-webinar";
  if (f.includes("video"))      return "badge-video";
  if (f.includes("event"))      return "badge-event";
  if (f.includes("discussion")) return "badge-discussion";
  return "badge-report";
}

function getDesc(format) {
  if (format in descriptions) return descriptions[format];
  for (const key of Object.keys(descriptions)) {
    if (key !== "Special Event" && format.toLowerCase().includes(key.toLowerCase())) return descriptions[key];
  }
  return null;
}

function buildTopics() {
  const c = document.getElementById("topic-container");
  c.innerHTML = "";
  topics.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "tag-btn" + (selectedTopics.has(t.id) ? " active" : "");
    btn.innerHTML = '<span class="tag-dot" aria-hidden="true"></span>' + t.label;
    btn.setAttribute("aria-pressed", selectedTopics.has(t.id) ? "true" : "false");
    btn.onclick = () => toggleTopic(t.id);
    c.appendChild(btn);
  });
}

function buildFormats() {
  const c = document.getElementById("format-container");
  c.innerHTML = "";
  formats.forEach(f => {
    const isActive = selectedFormats.has(f.id);
    const btn = document.createElement("button");
    btn.className = "tag-btn" + (isActive ? " active " + f.cls : "");
    btn.innerHTML = '<span class="tag-dot" aria-hidden="true"></span>' + f.label;
    btn.setAttribute("aria-pressed", isActive ? "true" : "false");
    btn.onclick = () => toggleFormat(f.id);
    c.appendChild(btn);
  });
}

function toggleTopic(id)  { if (selectedTopics.has(id))  selectedTopics.delete(id);  else selectedTopics.add(id);  buildTopics();  render(); }
function toggleFormat(id) { if (selectedFormats.has(id)) selectedFormats.delete(id); else selectedFormats.add(id); buildFormats(); render(); }
function clearTopics()    { selectedTopics.clear();  buildTopics();  render(); }
function clearFormats()   { selectedFormats.clear(); buildFormats(); render(); }

function render() {
  const area = document.getElementById("results-area");
  const noTopics  = selectedTopics.size === 0;
  const noFormats = selectedFormats.size === 0;

  const matched = visibleOpps.filter(o => {
    const topicMatch  = noTopics  || o.tags.some(t => selectedTopics.has(t));
    const formatMatch = noFormats || selectedFormats.has(formatFamily(o.format));
    return topicMatch && formatMatch;
  });

  const count = matched.length;

  if (count === 0) {
    area.innerHTML = '<div class="empty-state"><p>No opportunities match your current filters.<br>Try adjusting your topic or format selection.</p></div>';
    return;
  }

  let html = '<div class="results-meta"><span class="results-count">' + count + ' opportunit' + (count === 1 ? 'y' : 'ies') + ' matched</span></div><div class="results-list">';

  const filtered = !noTopics || !noFormats;
  matched.forEach((o, i) => {
    const desc = getDesc(o.format);
    const cardId = 'card-desc-' + i;
    if (desc) {
      if (filtered) {
        html += '<div class="result-card"><div class="card-top has-desc"><div><div class="result-title">' + o.title + '</div><div class="result-date">' + o.date + '</div></div><span class="format-badge ' + badgeClass(o.format) + '">' + o.format + '</span></div><div class="result-desc">' + desc + '</div></div>';
      } else {
        html += '<div class="result-card result-card--expandable" onclick="toggleDesc(\'' + cardId + '\', this)" style="cursor:pointer"><div class="card-top"><div><div class="result-title">' + o.title + '</div><div class="result-date">' + o.date + '</div></div><span class="format-badge ' + badgeClass(o.format) + '">' + o.format + '</span></div><div class="result-desc result-desc--hidden" id="' + cardId + '">' + desc + '</div></div>';
      }
    } else {
      html += '<div class="result-card"><div class="card-top"><div><div class="result-title">' + o.title + '</div><div class="result-date">' + o.date + '</div></div><span class="format-badge ' + badgeClass(o.format) + '">' + o.format + '</span></div></div>';
    }
  });

  html += '</div><div class="cta-bar"><div class="cta-text"><p>Interested in these opportunities?</p><p>Our team can build a custom sponsorship package around your goals.</p></div><a href="mailto:mbell@educationweek.org" class="cta-btn">Contact us &rarr;</a></div>';

  area.innerHTML = html;
}

function toggleDesc(id, card) {
  const desc = document.getElementById(id);
  const isOpen = !desc.classList.contains('result-desc--hidden');
  if (isOpen) {
    desc.classList.add('result-desc--hidden');
    card.querySelector('.card-top').classList.remove('has-desc');
  } else {
    desc.classList.remove('result-desc--hidden');
    card.querySelector('.card-top').classList.add('has-desc');
  }
}

buildTopics();
buildFormats();
render();
</script>
